<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Income Tracker</title>
  <link rel="stylesheet" href="main.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <main>
    <div class="container">
      <h1>Expense & Income Tracker</h1>
    <div id="balance">Balance: $0.00</div>

    <form id="transaction-form"> <!-- Final Addition: Updated Form Order-->
        <label for="date">Date:</label> <!--Final Addition: Date Tracking -->
        <input type="date" id="date" required />
        <label for="label">Label:</label>
        <input type="text" id="label" placeholder="Enter label (e.g., Grocery, Landlord, Employer)" required />
        
        <!--New Category Dropdown-->
        <label for="category">Category:</label>
        <select id="category" required>
          <option value="" disabled selected>Select Category</option>
          <option value="rent/mortgage">Rent/Mortgage</option>
          <option value="utilities">Utilities</option>
          <option value="food">Food</option>
          <option value="transportation">Transportation</option>
          <option value="entertainment">Entertainment</option>
          <option value="salary">Salary</option>
          <option value="other">Other</option>
        </select>
        <label for="type">Type:</label>
        <select id="type" required>
          <option value="" disabled selected>Select Type</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <label for="amount">Amount:</label>
        <input type="number" id="amount" placeholder="Amount" required />

      <button type="submit" class="add-btn">Add Transaction</button>
    </form>
    
    <!-- Final Addition: New Category Filter Dropdown -->
    <div class="filter-group">
      <label for="filter-category">Filter by Category:</label>
      <select id="filter-category">
        <option value="all">All</option>
        <option value="rent/mortgage">Rent/Mortgage</option>
        <option value="utilities">Utilities</option>
        <option value="food">Food</option>
        <option value="transportation">Transportation</option>
        <option value="entertainment">Entertainment</option>
        <option value="salary">Salary</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- Final Addition: New Type Filter Dropdown -->
    <div class="filter-group">
      <label for="filter-type">Filter by Type:</label>
      <select id="filter-type">
        <option value="all">All</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>

    <!-- Final Addition: New Sort Order Dropdown -->
    <div class="sort-group">
      <label for="sort-order">Sort by Date:</label>
      <select id="sort-order">
        <option value="" disabled selected>Select Order</option>
        <option value="asc">📅 Oldest First</option>
        <option value="desc">🆕 Newest First</option>
      </select>
    </div>
    
    <p id="sort-feedback" class="sort-feedback">Showing: Oldest First</p> <!-- Final Addition: Sort Feedback -->
    <div id="transaction-list-container">
      <ul id="transaction-list"></ul>
    </div>
    
    <div class="export-buttons">
      <button class="export-csv-btn" onclick="exportToCSV()">Export to CSV</button>
      <button class="export-pdf-btn" onclick="exportToPDF()">Export to PDF</button>
    </div>
  </div>
  </main>

  <script src="main.js"></script>

  <footer class="app-footer"> <!-- Final Addition: Footer -->
    <p>&copy; 2025 Expense & Income Tracker. Created by Virginia Marc. All rights reserved.</p>
  </footer>
</body>
</html>
